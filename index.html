<!DOCTYPE html>
<html>
<head>
  <title>Photo Gallery</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }
    h1 { text-align: center; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .gallery img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>Seval Oz Visits UC Berkeley</h1>
  <h1>March 27, 2026</h1>
  <div style="text-align:center">Right Click to Download</div><br/>
  <div class="gallery">
    <!-- Images will go here -->
  </div>

  <script>
    const imageFolder = "images/";
    const imageCount = 67; // adjust if needed
    const gallery = document.querySelector(".gallery");

    for (let i = 102; i <= (102+imageCount); i++) {
      const img = document.createElement("img");
      console.log(`IMG_0${String(i).padStart(2, '0')}.jpeg`);
      img.src = `IMG_0${String(i).padStart(2, '0')}.jpeg`;
      gallery.appendChild(img);
    }
  </script>
</body>
</html>
